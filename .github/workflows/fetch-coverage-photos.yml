name: Fetch real coverage photography

# Runs entirely on GitHub's servers — trigger it from the "Actions" tab on
# GitHub.com. No local install, shell, or git needed on your end.
#
# What it does:
#   1. Downloads 25 real, free-license Unsplash photos into public/coverage/,
#      overwriting the maroon "PHOTOGRAPHY PLACEHOLDER" files in place using
#      the exact filenames CoverageBlock.tsx already expects.
#   2. Verifies every file is a genuine JPEG (not an HTML error page or a
#      truncated/empty download).
#   3. Runs `npm ci` and `npm run build` to confirm the site still builds.
#   4. Only if every step above succeeds, commits the new photos straight to
#      this branch.
#
# If anything fails (a bad download, a build error), the workflow stops and
# nothing is committed — so main never ends up in a broken state.

on:
  workflow_dispatch: {}

jobs:
  fetch-and-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download real coverage photography
        run: |
          set -e
          OUT="public/coverage"
          mkdir -p "$OUT"

          download() {
            local file="$1"
            local id="$2"
            echo "Downloading $file ..."
            curl -sL --fail "https://images.unsplash.com/photo-${id}?auto=format&fit=crop&w=2000&q=80" -o "$OUT/$file"
          }

          # ---- Personal lines ----
          download "auto-insurance.jpg"                       "1739167378790-836fc651869c"
          download "motorcycle-insurance.jpg"                 "1716741011671-db4d7c6a8293"
          download "homeowners-insurance.jpg"                 "1572771669538-f302ed3752fc"
          download "condo-insurance.jpg"                      "1757970326337-95d7cca56fa1"
          download "renters-insurance.jpg"                    "1758523670991-ee93bc48d81d"
          download "rv-insurance.jpg"                         "1572368834884-8f400ca7d147"
          download "boat-insurance.jpg"                       "1742669001831-3ff03335d95a"
          download "umbrella-insurance.jpg"                   "1506382875697-90114c92b637"
          download "life-insurance.jpg"                       "1709216461598-018ae6307dc0"
          download "valuable-items-coverage.jpg"              "1749843205755-f191e6430a4d"

          # ---- Business lines ----
          download "general-liability.jpg"                    "1541888946425-d81bb19240f5"
          download "workers-compensation.jpg"                 "1775880303572-791fbbb73d32"
          download "commercial-auto.jpg"                       "1573855619022-f11131e05b3c"
          download "business-owners-policy-bop.jpg"            "1757005550364-56b30eb64ee7"
          download "commercial-property.jpg"                   "1745015446589-7ee6f702d8c1"
          download "professional-liability-eo.jpg"             "1758518730178-6e237bc8b87d"
          download "cyber-liability.jpg"                        "1708807472445-d33589e6b090"
          download "commercial-umbrella.jpg"                    "1531819177115-428566ccfb50"
          download "builders-risk.jpg"                          "1644221150186-5d785a471f44"
          download "inland-marine.jpg"                          "1645736315000-6f788915923b"
          download "commercial-crime.jpg"                       "1707157284454-553ef0a4ed0d"
          download "directors-officers-do.jpg"                  "1573164574572-cb89e39749b4"
          download "employment-practices-liability-epli.jpg"    "1672380135241-c024f7fbfa13"
          download "surety-bonds.jpg"                            "1758519288948-e3c87d2d78d8"
          download "risk-management-consulting.jpg"             "1598299803204-b73796f43289"

      - name: Verify every file is a real JPEG (not an HTML error page)
        run: |
          set -e
          FAIL=0
          for f in public/coverage/*.jpg; do
            SIZE=$(stat -c%s "$f")
            TYPE=$(file --brief --mime-type "$f")
            if [ "$TYPE" != "image/jpeg" ]; then
              echo "::error::$f is not a JPEG (detected: $TYPE)"
              FAIL=1
            fi
            if [ "$SIZE" -lt 20000 ]; then
              echo "::error::$f is suspiciously small ($SIZE bytes) — likely a failed/truncated download"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "One or more downloaded files failed verification. Stopping before build/commit."
            exit 1
          fi
          echo "All 25 files verified as real JPEGs."

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build the site
        run: npm run build

      - name: Commit and push the new photos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/coverage
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Replace coverage placeholders with real photography"
            git push
          fi
